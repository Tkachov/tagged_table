<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tagged Table</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__left">
        <h1 class="title">Tagged Table</h1>
        <div class="subtitle">Create elements, tag them with priorities, filter/sort, and share via JSON.</div>
      </div>
      <div class="topbar__right">
        <button id="newProjectBtn" class="btn btn--secondary">New project</button>
        <button id="exportBtn" class="btn">Export JSON</button>
        <label class="btn btn--secondary" for="importFile">Import JSON</label>
        <input id="importFile" type="file" accept="application/json,.json" hidden />
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <h2 class="card__title">Elements</h2>

        <div class="row row--gap">
          <input id="newElementText" class="input" type="text" placeholder="Add a new element and press Enter" />
          <button id="addElementBtn" class="btn">Add</button>
        </div>

        <div id="elements" class="elements"></div>
      </section>

      <aside class="card">
        <h2 class="card__title">Tags</h2>

        <div class="row row--gap">
          <input id="newTagName" class="input" type="text" placeholder="New tag name" />
          <button id="addTagBtn" class="btn">Add tag</button>
        </div>

        <div id="tagList" class="taglist"></div>
      </aside>
    </main>

    <footer class="bottomPanel">
      <section class="bottomPanel__section">
        <div class="bottomPanel__header">
          <h3>Filter</h3>
          <button id="resetFiltersBtn" class="btn btn--link">Reset</button>
        </div>

        <input id="filterText" class="input" type="text" placeholder="Filter by element text" />
        <div id="filterTagPills" class="pills"></div>
      </section>

      <section class="bottomPanel__section">
        <div class="bottomPanel__header">
          <h3>Sort</h3>
          <button id="resetSortBtn" class="btn btn--link">Reset</button>
        </div>

        <div class="sortBlock">
          <div class="sortBlock__available">
            <div class="sortBlock__label">Available</div>
            <div id="availableSort" class="pills"></div>
          </div>

          <div class="sortBlock__enabled">
            <div class="sortBlock__label">Enabled (drag to reorder)</div>
            <div id="enabledSort" class="enabledSort"></div>
          </div>
        </div>
      </section>
    </footer>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
