<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tagged Table</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="menubar">
      <div class="menu" id="menuFile">
        <button class="menu__trigger" type="button">File</button>
        <div class="menu__dropdown">
          <button class="menu__item" id="menuNewProject" type="button">New</button>
          <button class="menu__item" id="menuExport" type="button">Save</button>
          <label class="menu__item" for="importFile">Load</label>
        </div>
      </div>
      <div class="menu" id="menuEdit">
        <button class="menu__trigger" type="button">Edit</button>
        <div class="menu__dropdown">
          <button class="menu__item" id="menuTags" type="button">Tags</button>
        </div>
      </div>
      <input id="importFile" type="file" accept="application/json,.json" hidden />
    </nav>

    <div class="page">
      <section class="card card--elements">
        <div class="filterRow">
          <div class="filterRow__head elemCell--id">
            <div class="filterRow__label">Filter</div>
            <button id="resetFiltersBtn" class="sectionReset" title="Reset filters">×</button>
          </div>
          <div class="elemCell--text">
            <input id="filterText" class="elemInput filterRow__input" type="text" placeholder="Filter by text…" />
          </div>
          <div id="filterTagPills" class="filterRow__pills elemCell--tags"></div>
        </div>

        <div class="sortRow">
          <div class="sortRow__head elemCell--id">
            <div class="sortRow__label">Sort</div>
            <button id="resetSortBtn" class="sectionReset" title="Reset sort">×</button>
          </div>
          <div class="sortRow__criteria">
            <div id="enabledSort" class="sortRow__enabled"></div>
            <span class="sortSep">|</span>
            <div id="availableSort" class="sortRow__available"></div>
          </div>
        </div>

        <div class="elemTable__head">
          <div class="elemCell--id">#</div>
          <div class="elemCell--text">Text</div>
          <div class="elemCell--tags">Tags</div>
          <div class="elemCell--del"></div>
        </div>
        <div id="elements"></div>
        <div class="elemTable__addRow">
          <div class="elemCell--id"></div>
          <input id="newElementText" class="input elemTable__addInput" type="text" placeholder="Add a new element and press Enter" />
          <button id="addElementBtn" class="btn">Add</button>
        </div>
      </section>
    </div>

    <!-- Tags modal (Edit > Tags) -->
    <div id="tagsModal" class="modal" hidden>
      <div class="modal__backdrop" id="tagsModalBackdrop"></div>
      <div class="modal__box">
        <div class="modal__header">
          <h2 class="modal__title">Tags</h2>
          <button id="tagsModalClose" class="modal__close" type="button">×</button>
        </div>
        <div class="modal__body">
          <div class="row row--gap">
            <input id="newTagName" class="input" type="text" placeholder="New tag name" />
            <button id="addTagBtn" class="btn" type="button">Add tag</button>
          </div>
          <div id="tagList" class="taglist"></div>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
